name: Discover Questions

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 8am ET daily
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clone STM data (private)
        run: git clone --depth 1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/scifi-signals/Science-Trend-Monitor-Agent.git /tmp/stm

      - name: Clone Podcast Monitor data (public)
        run: git clone --depth 1 https://github.com/scifi-signals/Science-Podcast-Monitor.git /tmp/podcast

      - name: Run discovery
        run: cd pipeline && python run_discovery.py
        env:
          STM_DIR: /tmp/stm
          PODCAST_DIR: /tmp/podcast
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add discovered_questions.json pipeline/questions/
          git diff --cached --quiet || git commit -m "Discovery: update question queue"
          git pull --rebase origin main
          git push
